<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Gen Absensi AI</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .glass-panel {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    .btn-glossy {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      transition: all 0.3s ease;
    }
    .btn-glossy:hover:not(:disabled) {
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
      transform: translateY(-2px);
    }
    .btn-glossy:disabled {
      background: #334155;
      cursor: not-allowed;
      opacity: 0.7;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="glass-panel w-full max-w-md rounded-2xl p-6 sm:p-8 flex flex-col items-center">
    
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-300">
        E-Gen Absensi AI
      </h2>
      <p class="text-slate-400 text-sm mt-2">Mesin Vision: Gemini / OpenAI</p>
    </div>

    <div class="w-full mb-6">
      <label for="fileInput" class="block w-full border-2 border-dashed border-slate-600 rounded-xl p-8 text-center cursor-pointer hover:border-blue-400 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mx-auto text-blue-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
        </svg>
        <span id="fileNameDisplay" class="text-slate-300 font-medium">Pilih Bukti Absensi</span>
      </label>
      <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="updateFileName()">
    </div>

    <button id="uploadBtn" onclick="processFile()" class="btn-glossy w-full py-3 rounded-lg font-bold text-white uppercase tracking-wide text-sm">
      Analisa & Ekstrak
    </button>

  </div>

  <script>
    const Toast = Swal.mixin({
      toast: true,
      position: 'top-end',
      showConfirmButton: false,
      timer: 3000,
      timerProgressBar: true,
      background: '#1e293b',
      color: '#fff',
      customClass: { popup: 'glass-panel' }
    });

    function updateFileName() {
      const input = document.getElementById('fileInput');
      const display = document.getElementById('fileNameDisplay');
      if (input.files.length > 0) display.innerText = input.files[0].name;
    }

    async function processFile() {
      const fileInput = document.getElementById('fileInput');
      const btn = document.getElementById('uploadBtn');

      if (fileInput.files.length === 0) {
        Toast.fire({ icon: 'warning', title: 'Pilih foto absensi dulu!' });
        return;
      }

      const file = fileInput.files[0];
      btn.disabled = true;
      btn.innerText = "Memproses Vision AI...";
      
      Swal.fire({
        title: 'Menganalisa Data...',
        html: 'AI sedang mengekstrak jam masuk dan pulang.<br>Mohon tunggu sebentar.',
        allowOutsideClick: false,
        background: '#0f172a',
        color: '#fff',
        didOpen: () => { Swal.showLoading(); }
      });

      const reader = new FileReader();
      reader.onload = async function(e) {
        const base64Data = e.target.result;
        
        try {
          // Memanggil Vercel Serverless Function
          const response = await fetch('/api/ocr', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              mimeType: file.type,
              base64: base64Data
            })
          });
          
          const result = await response.json();

          if (result.status === 'success' && result.data.length > 0) {
            Swal.fire({
              icon: 'success',
              title: 'Ekstraksi Selesai!',
              text: `Berhasil mencatat ${result.data.length} baris kehadiran.`,
              background: '#0f172a',
              color: '#fff',
              confirmButtonColor: '#3b82f6'
            });
            generateCSV(result.data);
          } else {
             Swal.fire({
              icon: 'error',
              title: 'Gagal',
              text: result.message || 'Data tidak terdeteksi oleh AI.',
              background: '#0f172a',
              color: '#fff',
              confirmButtonColor: '#3b82f6'
            });
          }
        } catch (error) {
          Swal.fire({
            icon: 'error',
            title: 'Koneksi Terputus',
            text: 'Gagal menghubungi server Vercel API.',
            background: '#0f172a',
            color: '#fff',
            confirmButtonColor: '#3b82f6'
          });
        } finally {
          btn.disabled = false;
          btn.innerText = "Analisa & Ekstrak";
          fileInput.value = "";
          document.getElementById('fileNameDisplay').innerText = "Pilih Bukti Absensi";
        }
      };
      reader.readAsDataURL(file);
    }

    function generateCSV(dataArray) {
      const header = ["NIP", "TANGGAL", "KATEGORI", "JENIS", "WAKTU", "KETERANGAN"];
      const csvRows = [header.join(",")];
      
      dataArray.forEach(row => {
        const values = [row.nip, row.tanggal, row.kategori, row.jenis, row.waktu, row.keterangan];
        csvRows.push(values.join(","));
      });
      
      const csvString = csvRows.join("\n");
      const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
      
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.setAttribute("href", url);
      link.setAttribute("download", "Import_Absensi_M_ZAEN_SYACHRULLAH_HASIL.csv");
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
